<style>

</style></head><body>

<script>
var K='ot', O=JSON.parse(localStorage.getItem(K)||'[]'), sk=null,sd='asc',ft={},sq='',si=new Set(),sf=false;

var editingCell=null;

  if(editingCell)return;editingCell=el;

}

function recalc(id){var o=O.find(function(x){return x.id==id});if(!o)return;o.profit=P(o);o.returnProfit=RP(o)}

  SC.forEach(function(c){var th=Make('th','');T(th,c.l+(sk==c.k?(sd=='asc'?' ▲':' ▼'):''));th.onclick=function(){sk=sk==c.k?(sd=='asc'?'desc':'asc'):c.k;sd=sk==c.k?sd:'asc';RENDER()};rhr.appendChild(th)});

  rt.appendChild(rh);
  var rb=Make('tbody','');fl.forEach(function(o,i){var ev=i%2==1,cc=H(o.customerName||''),tr=Make('tr',ev?'z':'');SC.forEach(function(c){tr.appendChild(RenderCell(c,o[c.k],i,ev,o.id,cc))});var dtd=Make('td','tc');var db=Make('button','');db.style.cssText='border:none;background:none;cursor:pointer;color:#ef4444;font-size:14px';db.textContent='🗑';db.onclick=function(){O=O.filter(function(x){return x.id!=o.id});S();RENDER()};dtd.appendChild(db);tr.appendChild(dtd);rb.appendChild(tr)});
